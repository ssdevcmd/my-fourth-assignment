<!DOCTYPE html>
<html lang="en" data-theme = "light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>

    <!-- tailwind + daisy -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- fonts -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<!-- icons -->
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>
    *{
        font-family:  "Geist", sans-serif;
    }
</style>
</head>

<body class="min-h-screen w-[80%] mx-auto py-10 ">
  <header class="">
<div class="bg-white px-6 py-6">

  <!-- Title -->
  <h1 class="text-3xl font-bold text-black mb-6">
    Job Application Tracker
  </h1>

  <!-- Stats Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">

    <!-- Total -->
    <div class="bg-gray-100 p-4 rounded-lg">
      <p class="text-sm text-gray-500">Total</p>
      <p id="total-count" class="text-2xl font-bold">0</p>
    </div>

    <!-- Interview -->
    <div class="bg-gray-100 p-4 rounded-lg">
      <p class="text-sm text-gray-500">Interview</p>
      <p id="interview-count" class="text-2xl font-bold text-green-500">0</p>
    </div>

    <!-- Rejected -->
    <div class="bg-gray-100 p-4 rounded-lg">
      <p class="text-sm text-gray-500">Rejected</p>
      <p id="rejected-count" class="text-2xl font-bold text-red-500">0</p>
    </div>

  </div>

</div>
</header>

<hr class="my-5">


</body>
</html>
